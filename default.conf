server {
    listen 80;
    server_name localhost;

    # Disable Nginx version number disclosure in Server header and error pages
    server_tokens off;

    # Root directory and index file
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Global security headers
    # 1. Content Security Policy (CSP): restrictive baseline allowing self and Google Fonts
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

    # 2. Strict Transport Security (HSTS): ensure HTTPS exclusively (2 years, includes subdomains, preloaded)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # 3. X-Frame-Options: prevent clickjacking by blocking embedding inside iframes
    add_header X-Frame-Options "DENY" always;

    # 4. X-Content-Type-Options: force browser to use MIME types declared in Content-Type (nosniff)
    add_header X-Content-Type-Options "nosniff" always;

    # 5. Referrer Policy: control referrer information sent on navigation
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 6. Permissions Policy: disable unused hardware and browser APIs for user privacy
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), magnetometer=(), gyroscope=(), speaker=(), payment=()" always;

    location / {
        try_files $uri $uri/ =404;
    }

    # Custom 404 handler redirecting to home
    error_page 404 /index.html;

    # Cache static assets for performance
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|json)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        
        # Must repeat headers in locations where headers might be overridden
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), magnetometer=(), gyroscope=(), speaker=(), payment=()" always;
    }
}
